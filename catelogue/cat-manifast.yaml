apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: kubernates-dashboard
data:
  MONGO: "true"
  # these are environment variables that will be used by the catalogue deployment
  # these are used to connect to the mongodb deployment
  MONGO_DB_URL: mongodb://mongodb-service.kubernates-dashboard.svc.cluster.local:27017/catalogue?authSource=admin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: kubernates-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      project: TailorSpot
      component: catalogue
      tier: backend
  template:
    metadata:
      labels:
        project: TailorSpot
        component: catalogue
        tier: backend
    spec:
      containers:
      - name: catalogue
        image: paulmaruthi18/catalogue:v1
        imagePullPolicy: Always    ## Always pull the image from the registry, even if it is already present on the node.
        envFrom:
        - configMapRef:
            name: catalogue
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15  
---

apiVersion: v1
kind: Service
metadata:
  name: catalogue-service
  namespace: kubernates-dashboard
spec:
  selector:
    project: TailorSpot
    component: catalogue
    tier: backend
    ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port